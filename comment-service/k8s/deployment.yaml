apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-service
  namespace: task-api
  labels:
    app: comment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comment-service
  template:
    metadata:
      labels:
        app: comment-service
    spec:
      containers:
      - name: comment-service
        image: registry.gitlab.shiveh.com/mapir/upstream/kibana:comment-service
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        # env:
        # - name: POSTGRES_HOST
        #   value: "comment-service-db"
        # - name: POSTGRES_PORT
        #   value: "5432"
        # - name: POSTGRES_DB
        #   value: "commentdb"
        # - name: POSTGRES_USER
        #   valueFrom:
        #     secretKeyRef:
        #       name: postgres-credentials
        #       key: POSTGRES_USER
        # - name: POSTGRES_PASSWORD
        #   valueFrom:
        #     secretKeyRef:
        #       name: postgres-credentials
        #       key: POSTGRES_PASSWORD
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5