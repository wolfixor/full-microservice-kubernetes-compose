apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-service
  namespace: task-api
  labels:
    app: comment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comment-service
  template:
    metadata:
      labels:
        app: comment-service
    spec:
      containers:
      - name: comment-service
        image: registry.gitlab.shiveh.com/mapir/upstream/kibana:comment-service
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: POSTGRES_HOST
          value: "comment-service-db"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "comment_db"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_PASSWORD
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_DB
          value: "2"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: REDIS_PASSWORD
        - name: REDIS_KEY_PREFIX
          value: "comment"
        - name: CACHE_EXPIRE_SECONDS
          value: "300"
        - name: ROOT_PATH
          value: "/comments"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---

apiVersion: v1
kind: Service
metadata:
  name: comment-service
  namespace: task-api
  labels:
    app: comment-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: comment-service
  ports:
  - name: http
    port: 80
    targetPort: 8000
  type: ClusterIP