apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: task-api
  labels:
    app: search-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      initContainers:
        - name: wait-for-elasticsearch
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Elasticsearch to be ready..."
              until wget -q --spider http://elasticsearch-es-http:9200; do
                echo "Elasticsearch not ready yet, waiting..."
                sleep 5
              done
              echo "Elasticsearch is ready!"
      containers:
        - name: search-service
          image: registry.gitlab.shiveh.com/mapir/upstream/kibana:search-service
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: APP_NAME
              value: "search-service"
            - name: APP_VERSION
              value: "1.0.0"
            - name: ELASTICSEARCH_HOST
              value: "elasticsearch-es-http"
            - name: ELASTICSEARCH_PORT
              value: "9200"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "3"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: REDIS_PASSWORD
            - name: TASK_SERVICE_URL
              value: "http://task-service"
            - name: COMMENT_SERVICE_URL
              value: "http://comment-service"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
          resources:
            requests:
              cpu: 200m 
              memory: 256Mi 
            limits:
              cpu: 500m 
              memory: 512Mi 
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: task-api
  labels:
    app: search-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: search-service
  ports:
  - name: http
    port: 80
    targetPort: 8000
  type: ClusterIP
