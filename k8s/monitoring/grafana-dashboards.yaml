      "schemaVersion": 38,
      "panels": [
        {
          "title": "Request Rate",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(kong_http_requests_total[5m])) by (service)",
              "legendFormat": "{{ service }}"
