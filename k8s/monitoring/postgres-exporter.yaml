---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: monitoring
  labels:
    app: postgres-exporter
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter-user
  namespace: monitoring
  labels:
    app: postgres-exporter
    postgres-instance: user
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
      postgres-instance: user
  template:
    metadata:
      labels:
        app: postgres-exporter
        postgres-instance: user
    spec:
      containers:
      - name: postgres-exporter
        image: docker.arvancloud.ir/prometheuscommunity/postgres-exporter:v0.14.0
        ports:
        - containerPort: 9187
          name: http
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_PASSWORD
        - name: DATA_SOURCE_NAME
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@user-service-db.task-api.svc.cluster.local:5432/user_db?sslmode=disable"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 9187
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 9187
          initialDelaySeconds: 5
          periodSeconds: 10
