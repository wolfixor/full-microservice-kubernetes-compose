apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      scrape_timeout: 10s
      evaluation_interval: 15s

    scrape_configs:
    # Kubernetes API server
    - job_name: kubernetes-apiservers
      kubernetes_sd_configs:
      - role: endpoints
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        insecure_skip_verify: false
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

    # Kubernetes nodes
    - job_name: kubernetes-nodes
      kubernetes_sd_configs:
      - role: node
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        insecure_skip_verify: false
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

    # Kubernetes kubelet (cAdvisor metrics)
    - job_name: kubernetes-cadvisor
      kubernetes_sd_configs:
      - role: node
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        insecure_skip_verify: false
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      metric_relabel_configs:
      - source_labels: [__name__]
        regex: (container_.*|machine_.*|kubelet_.*)
        action: keep

    # Application services (user, task, comment, search)
    - job_name: microservices
      kubernetes_sd_configs:
      - role: service
        namespaces:
          names: [task-api]
      relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app]
        regex: (user-service|task-service|comment-service|search-service)
        action: keep
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
        replacement: $1
      - source_labels: [__meta_kubernetes_service_label_app]
        target_label: service
      - action: labelmap
        regex: __meta_kubernetes_service_label_(.+)

    # Kong Gateway
    - job_name: kong
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - task-api
      relabel_configs:
      - source_labels:
          - __meta_kubernetes_pod_label_app
        action: keep
        regex: kong-gateway
      - source_labels:
          - __meta_kubernetes_pod_container_port_name
        action: keep
        regex: admin
      - source_labels:
          - __meta_kubernetes_pod_name
        target_label: pod
      metrics_path: /metrics



    # PostgreSQL exporters
    - job_name: postgres
      kubernetes_sd_configs:
      - role: service
        namespaces:
          names: [monitoring]
      relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app]
        action: keep
        regex: postgres-exporter
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__meta_kubernetes_service_label_postgres_instance]
        target_label: postgres_instance

    # Redis exporter
    - job_name: redis
      kubernetes_sd_configs:
      - role: service
        namespaces:
          names: [monitoring]
      relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app]
        action: keep
        regex: redis-exporter

    # Elasticsearch exporter
    - job_name: elasticsearch
      kubernetes_sd_configs:
      - role: service
        namespaces:
          names: [monitoring]
      relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app]
        action: keep
        regex: elasticsearch-exporter

    # Grafana
    - job_name: grafana
      kubernetes_sd_configs:
      - role: service
        namespaces:
          names: [monitoring]
      relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app]
        action: keep
        regex: grafana

    # kube-state-metrics
    - job_name: kube-state-metrics
      kubernetes_sd_configs:
      - role: service
        namespaces:
          names: [monitoring]
      relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app]
        action: keep
        regex: kube-state-metrics

    # Prometheus itself
    - job_name: prometheus
      static_configs:
      - targets: ["localhost:9090"]
