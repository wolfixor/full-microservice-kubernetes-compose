version: "3.8"

services:
  # ---------------- USER SERVICE ----------------
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    image: registry.gitlab.shiveh.com/mapir/upstream/kibana:user-service
    container_name: user-service
    ports:
      - "8001:8000"
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "true"
      POSTGRES_HOST: user-service-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0  # User service uses database 0
      REDIS_PASSWORD: ""
    networks:
      - wolfix-service-network
    depends_on:
      user-service-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service-db:
    image: 185.120.221.119:8083/postgres:17.10-alpine3.22
    container_name: user-service-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./place-data/user_service_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wolfix-service-network




  # ---------------- TASK SERVICE ----------------
  task-service:
    build:
      context: ./task-service
      dockerfile: Dockerfile
    image: registry.gitlab.shiveh.com/mapir/upstream/kibana:task-service
    container_name: task-service
    ports:
      - "8002:8000"
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "true"
      POSTGRES_HOST: task-service-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: task_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 1  # Task service uses database 1
      REDIS_PASSWORD: ""
    networks:
      - wolfix-service-network
    depends_on:
      task-service-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  task-service-db:
    image: 185.120.221.119:8083/postgres:17.10-alpine3.22
    container_name: task-service-db
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./place-data/task_service_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d task_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wolfix-service-network
  



  # ---------------- COMMENT SERVICE ----------------
  comment-service:
    build:
      context: ./comment-service
      dockerfile: Dockerfile
    image: registry.gitlab.shiveh.com/mapir/upstream/kibana:comment-service
    container_name: comment-service
    ports:
      - "8003:8000"
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "true"
      POSTGRES_HOST: comment-service-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: comment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 2  # Comment service uses database 2
      REDIS_PASSWORD: ""
    networks:
      - wolfix-service-network
    depends_on:
      comment-service-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  comment-service-db:
    image: 185.120.221.119:8083/postgres:17.10-alpine3.22
    container_name: comment-service-db
    environment:
      POSTGRES_DB: comment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./place-data/comment_service_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d comment_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wolfix-service-network
  
  # ---------------- SEARCH SERVICE ----------------
  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    image: registry.gitlab.shiveh.com/mapir/upstream/kibana:search-service
    container_name: search-service
    ports:
      - "8004:8000"
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 3  # Search service uses database 3
      REDIS_PASSWORD: ""
      TASK_SERVICE_URL: http://task-service:8000
      COMMENT_SERVICE_URL: http://comment-service:8000
      PORT: 8000
    networks:
      - wolfix-service-network
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      task-service:
        condition: service_healthy
      comment-service:
        condition: service_healthy

  # ---------------- ELASTICSEARCH ----------------
  elasticsearch:
    image: 185.120.221.119:8083/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - ./place-data/elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - wolfix-service-network
    restart: unless-stopped

  # Shared Redis for all services
  redis:
    image: 185.120.221.119:8083/redis:7.4-alpine
    container_name: redis
    environment:
      REDIS_PASSWORD: ""
    volumes:
      - ./place-data/redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wolfix-service-network
    restart: unless-stopped

  # ---------------- PROMETHEUS ----------------
  prometheus:
    image: 185.120.221.119:8083/prom/prometheus:v2.48.0
    container_name: prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=8GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - '9090:9090'
    networks:
      - wolfix-service-network
    restart: unless-stopped

  # ---------------- REDIS EXPORTER ----------------
  redis-exporter:
    image: 185.120.221.119:8083/oliver006/redis_exporter:v1.56.0
    container_name: redis-exporter
    command:
      - '--redis.addr=redis://redis:6379'
      - '--check-keys=*'
    ports:
      - '9121:9121'
    networks:
      - wolfix-service-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------- ELASTICSEARCH EXPORTER ----------------
  elasticsearch-exporter:
    image: 185.120.221.119:8083/prometheuscommunity/elasticsearch-exporter:v1.6.0
    container_name: elasticsearch-exporter
    command:
      - '--es.uri=http://elasticsearch:9200'
      - '--es.all'
      - '--es.indices'
      - '--collector.clustersettings'
      - '--es.indices_settings'
      - '--es.shards'
    ports:
      - '9114:9114'
    networks:
      - wolfix-service-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ---------------- POSTGRES EXPORTERS ----------------
  postgres-exporter-user:
    image: 185.120.221.119:8083/prometheuscommunity/postgres-exporter:v0.14.0
    container_name: postgres-exporter-user
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@user-service-db:5432/user_db?sslmode=disable"
    ports:
      - '9187:9187'
    networks:
      - wolfix-service-network
    depends_on:
      user-service-db:
        condition: service_healthy
    restart: unless-stopped

  postgres-exporter-task:
    image: 185.120.221.119:8083/prometheuscommunity/postgres-exporter:v0.14.0
    container_name: postgres-exporter-task
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@task-service-db:5432/task_db?sslmode=disable"
    networks:
      - wolfix-service-network
    depends_on:
      task-service-db:
        condition: service_healthy
    restart: unless-stopped

  postgres-exporter-comment:
    image: 185.120.221.119:8083/prometheuscommunity/postgres-exporter:v0.14.0
    container_name: postgres-exporter-comment
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@comment-service-db:5432/comment_db?sslmode=disable"
    networks:
      - wolfix-service-network
    depends_on:
      comment-service-db:
        condition: service_healthy
    restart: unless-stopped

  # ---------------- GRAFANA ----------------
  grafana:
    image: 185.120.221.119:8083/grafana/grafana:10.2.0
    container_name: grafana
    volumes:
      - ./grafana/prometheus-datasource.yml:/etc/grafana/provisioning/datasources/prometheus-datasource.yml
      - ./grafana/dashboard-provider.yml:/etc/grafana/provisioning/dashboards/dashboard-provider.yml
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3000:3000"
    networks:
      - wolfix-service-network
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  # ---------------- KIBANA ----------------
  kibana:
    image: 185.120.221.119:8083/kibana:8.11.0
    container_name: kibana
    volumes:
      - ./conf/kibana:/usr/share/kibana/config
    ports:
      - "5601:5601"
    networks:
      - wolfix-service-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

# ---------------- VOLUMES ----------------
volumes:
  prometheus_data:
  grafana_data:

# ---------------- NETWORKS ----------------
networks:
  wolfix-service-network: